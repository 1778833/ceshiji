<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>设置 - 水果机</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-theme="strawberry"> <!-- 主题会由JS动态设置 -->

    <!-- =========== 主容器 =========== -->
    <div id="phone-case">
        <div id="screen">

            <!-- =========== 设置页面内容 =========== -->
            <div class="settings-page">
                <div class="settings-header">
                    <a href="index.html" class="back-button">‹</a>
                    <h1>设置</h1>
                </div>

                <!-- API 连接区 -->
                <div class="settings-section">
                    <h2>API 连接</h2>
                    <p>连接到你的模型服务</p>
                    <div class="settings-item">
                        <label for="api-address">地址</label>
                        <input type="text" id="api-address" placeholder="输入 API 地址">
                    </div>
                    <div class="settings-item">
                        <label for="api-key">密钥</label>
                        <input type="password" id="api-key" placeholder="输入 API 密钥">
                    </div>
                    <div class="settings-item">
                        <button class="settings-button" id="get-models-btn" style="width: 100%; margin-top: 5px; background-color: #6c757d;">获取模型列表</button>
                    </div>
                     <div class="settings-item">
                        <label for="api-model">选择模型</label>
                        <select id="api-model">
                            <!-- 模型选项将通过 JS 动态加载 -->
                            <option value="">请先获取模型</option>
                        </select>
                    </div>
                    <div class="settings-item">
                        <label for="api-temperature">温度 (Temperature)</label>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <input type="range" id="api-temperature" min="0" max="2" step="0.1" value="1">
                            <span id="temperature-value">1.0</span>
                        </div>
                        <p style="font-size: 12px; color: #666; margin-top: 5px;">控制输出的随机性，推荐 1.0 平衡。</p>
                    </div>

                    <div class="settings-item" style="border-top: 1px solid #eee; padding-top: 15px; margin-top: 15px;">
                        <label>API 预设管理</label>
                        <div style="display: flex; gap: 5px; margin-bottom: 10px;">
                            <input type="text" id="preset-name" placeholder="预设名称">
                            <button class="settings-button" id="save-preset-btn" style="width: auto;">保存预设</button>
                        </div>
                        <select id="api-presets">
                            <option value="">-- 选择预设 --</option>
                        </select>
                        <button class="settings-button" id="load-preset-btn" style="margin-top: 5px; background-color: #28a745;">加载选中预设</button>
                        <button class="settings-button" id="delete-preset-btn" style="margin-top: 5px; background-color: #dc3545;">删除选中预设</button>
                    </div>

                    <button class="settings-button" id="save-api-settings" style="margin-top: 20px;">保存当前配置</button>
                </div>

                <!-- 备份存档区 -->
                <div class="settings-section">
                    <h2>备份与恢复</h2>
                    <p>导出或导入你的所有应用数据和设置。</p>
                    <div class="button-group">
                        <button class="settings-button" id="export-data">导出存档</button>
                        <button class="settings-button" id="import-data">导入存档</button>
                    </div>
                </div>

            </div>
            <!-- =========== 设置页面内容 END =========== -->

        </div>
    </div>
    <!-- =========== 主容器 END =========== -->

    <!-- 我们需要一个新的JS文件来处理设置页的逻辑 -->
    <script src="js/settings.js"></script>
</body>
</html>
