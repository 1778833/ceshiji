<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>美化中心 - 水果机</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 美化中心专属样式 */
        .beautify-page {
            padding: 20px;
            color: var(--font-color);
            overflow-y: auto;
            height: 100%;
        }
        .theme-selection, .icon-customization, .css-customization {
            background: var(--widget-bg);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .theme-selection h2, .icon-customization h2, .css-customization h2 {
            font-size: 18px;
            margin-bottom: 15px;
        }
        .theme-buttons {
            display: flex;
            justify-content: space-around;
            gap: 10px;
        }
        .theme-btn {
            padding: 10px 15px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            color: white;
            flex-grow: 1;
        }
        #theme-strawberry { background-color: #ffb3b3; }
        #theme-orange { background-color: #ffc8a9; }
        #theme-watermelon { background-color: #a8d8b5; }

        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 15px;
        }
        .icon-setter {
            text-align: center;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .icon-setter .icon-preview-container {
            width: 80px;
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
        }
        .icon-setter .icon-preview {
            width: 50px;
            height: 50px;
            background: var(--icon-gradient);
            border-radius: 50%;
            cursor: pointer;
            transition: width 0.1s, height 0.1s;
        }
        .icon-size-slider {
            width: 80%;
            margin-top: 5px;
        }
        #custom-css {
            width: 100%;
            height: 150px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(0,0,0,0.1);
            background: rgba(255,255,255,0.5);
            color: var(--font-color);
            font-family: monospace;
            resize: vertical;
        }
    </style>
</head>
<body data-theme="strawberry">

    <div id="phone-case">
        <div id="screen">
            <div class="beautify-page">
                <div class="settings-header">
                    <a href="index.html" class="back-button">‹</a>
                    <h1>美化中心</h1>
                </div>


                <!-- 背景自定义 -->
                <div class="settings-section">
                    <h2>主界面背景</h2>
                    <p>点击下方按钮上传你喜欢的背景图片。</p>
                    <div class="button-group">
                        <button class="settings-button" id="upload-bg-btn">上传背景图片</button>
                        <button class="settings-button" id="reset-bg-btn" style="background-color: #999;">恢复默认背景</button>
                    </div>
                </div>

                <!-- 图标自定义 -->
                <div class="icon-customization">
                    <h2>主界面图标</h2>
                    <p style="margin-bottom: 10px; font-size: 12px; color: #666;">
                        在这里可以修改图标样式和大小。如果想重置主界面的自由布局，请点击下方按钮。
                    </p>
                    <div class="button-group" style="margin-bottom: 20px;">
                        <button class="settings-button" id="reset-layout-btn" style="background-color: #ff9500;">恢复默认布局</button>
                    </div>
                     <div class="icon-grid">
                        <!-- JS会动态生成这里的图标设置 -->
                    </div>
                </div>

                <!-- 全局字体自定义 -->
                <div class="settings-section">
                    <h2>全局字体设置</h2>
                    <p>设置整个应用的字体。</p>
                    <div class="settings-item">
                        <label for="font-url">字体链接 (URL)</label>
                        <input type="text" id="font-url" placeholder="输入字体文件 URL (woff2, ttf, etc.)">
                        <p style="font-size: 12px; color: #666; margin-top: 5px;">支持 .woff2, .ttf, .otf 等格式。</p>
                    </div>
                     <div class="button-group">
                        <button class="settings-button" id="apply-font-btn">应用字体</button>
                        <button class="settings-button" id="reset-font-btn" style="background-color: #999;">恢复默认字体</button>
                    </div>
                </div>

                <!-- 自定义CSS -->
                <div class="css-customization">
                    <h2>自定义样式 (CSS)</h2>
                    <p>主容器已添加类名 <code>.feshuiguo</code>，你可以基于此进行深度定制。</p>
                    <div class="button-group" style="margin-bottom: 10px;">
                        <button class="settings-button" id="get-css-template" style="background-color: #6c757d; font-size: 14px; padding: 8px;">获取完整 CSS 模板 </button>
                    </div>
                    <textarea id="custom-css" placeholder="/* 在这里输入你的 CSS 代码 */"></textarea>
                    <button class="settings-button" id="save-css">应用并保存样式</button>
                </div>

                <!-- 美化预设管理 -->
                <div class="settings-section">
                    <h2>美化预设管理</h2>
                    <p>保存当前整体美化（背景、图标、CSS、字体）为预设。</p>
                    <div class="settings-item">
                        <input type="text" id="beautify-preset-name" placeholder="预设名称">
                    </div>
                    <div class="button-group" style="margin-top: 10px;">
                        <button class="settings-button" id="save-beautify-preset">保存为新预设</button>
                    </div>
                    <div style="margin-top: 15px;">
                        <label>加载预设</label>
                        <select id="beautify-presets-select">
                            <option value="">-- 选择预设 --</option>
                        </select>
                        <div class="button-group" style="margin-top: 10px;">
                            <button class="settings-button" id="load-beautify-preset" style="background-color: #28a745;">加载</button>
                            <button class="settings-button" id="delete-beautify-preset" style="background-color: #dc3545;">删除</button>
                        </div>
                    </div>
                </div>

                <!-- 全局配置导出/导入 -->
                <div class="settings-section">
                    <h2>全局配置备份</h2>
                    <p>导出包含图标、图片、便签、样式和预设的完整备份。</p>
                    <div class="button-group">
                        <button class="settings-button" id="export-config">导出全局配置</button>
                        <button class="settings-button" id="import-config">导入全局配置</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/beautify.js"></script>
</body>
</html>
