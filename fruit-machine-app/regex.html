<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>正则管理 - 水果机</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 正则页面专属样式 */
        .regex-page {
            padding: 20px;
            color: var(--font-color);
            overflow-y: auto;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        
        .rx-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .rx-list {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-bottom: 80px;
        }

        .rx-item {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 12px;
            border: 1px solid rgba(0,0,0,0.05);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .rx-item.disabled {
            background: rgba(240, 240, 240, 0.9);
            opacity: 0.8;
        }

        /* 头部：总是显示 */
        .rx-header {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            background: rgba(255,255,255,0.5);
        }

        .rx-title-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-grow: 1;
        }
        
        .rx-name {
            font-weight: bold;
            font-size: 15px;
            color: #333;
        }

        .rx-preview-text {
            font-size: 12px;
            color: #888;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 150px;
        }

        /* 展开箭头 */
        .rx-expand-icon {
            transition: transform 0.3s;
            font-size: 12px;
            color: #999;
            margin-left: 10px;
        }
        .rx-item.expanded .rx-expand-icon {
            transform: rotate(180deg);
        }

        /* 详情区域：默认隐藏 */
        .rx-body {
            display: none;
            padding: 15px;
            border-top: 1px solid rgba(0,0,0,0.05);
            background: rgba(255,255,255,0.3);
        }
        .rx-item.expanded .rx-body {
            display: block;
        }

        .rx-detail-row {
            margin-bottom: 10px;
            font-size: 13px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .rx-label { color: #666; font-size: 12px; }
        .rx-code {
            font-family: monospace;
            background: rgba(0,0,0,0.05);
            padding: 4px 8px;
            border-radius: 4px;
            color: #d63384;
            word-break: break-all;
        }

        /* 单条测试区 */
        .rx-test-zone {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed #ccc;
        }
        .rx-test-input, .rx-test-output {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 12px;
            margin-bottom: 5px;
            box-sizing: border-box;
        }
        .rx-test-output {
            background: #f8f9fa;
            color: #28a745;
            min-height: 20px;
        }

        .rx-btn-row {
            display: flex;
            justify-content: flex-end;
            margin-top: 10px;
        }
        .edit-btn {
            padding: 6px 15px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
        }

        /* 开关样式 */
        .switch {
            position: relative;
            display: inline-block;
            width: 34px;
            height: 20px;
            flex-shrink: 0;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: #28a745; }
        input:checked + .slider:before { transform: translateX(14px); }

        /* 弹窗样式 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            width: 90%;
            max-width: 350px;
            border-radius: 15px;
            padding: 20px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 14px; font-weight: bold; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;
        }
        .button-group { display: flex; gap: 10px; margin-top: 20px; }
        .settings-button {
            flex: 1; padding: 10px; border: none; border-radius: 8px;
            background-color: #007bff; color: white; cursor: pointer;
        }

    </style>
</head>
<body data-theme="strawberry">

    <div id="phone-case">
        <div id="screen">
            <div class="regex-page">
                <div class="settings-header">
                    <a href="index.html" class="back-button">‹</a>
                    <h1>正则替换</h1>
                </div>

                <div class="rx-actions">
                    <button class="settings-button" id="add-regex-btn">新建规则</button>
                    <button class="settings-button" id="clear-all-btn" style="background-color: #dc3545;">清空所有</button>
                </div>

                <div id="regex-list" class="rx-list">
                    <!-- 动态生成 -->
                </div>

            </div>
        </div>
    </div>

    <!-- 编辑正则弹窗 -->
    <div id="regex-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title">编辑正则规则</h2>
            
            <div class="form-group">
                <label>规则名称 (方便记忆)</label>
                <input type="text" id="rx-name" placeholder="例如：去除非法字符">
            </div>

            <div class="form-group">
                <label>正则表达式 (Pattern)</label>
                <input type="text" id="rx-pattern" placeholder="输入正则内容，无需首尾斜杠">
                <small style="color:#d63384; font-size:10px;">注意：不需要输入 /.../，只写内容即可，例如 喵喵</small>
            </div>

            <div class="form-group">
                <label>替换文本 (Replacement)</label>
                <textarea id="rx-replacement" placeholder="替换后的内容" style="height: 60px;"></textarea>
                <small style="color:#666; font-size:10px;">支持 \n 换行</small>
            </div>

            <div class="button-group">
                <button class="settings-button" id="save-regex-btn">保存</button>
                <button class="settings-button" id="delete-regex-btn" style="background-color: #dc3545; display:none;">删除</button>
                <button class="settings-button" id="cancel-regex-btn" style="background-color: #6c757d;">取消</button>
            </div>
        </div>
    </div>

    <script src="js/regex-engine.js"></script>
    <script src="js/regex.js"></script>
</body>
</html>
